<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<title>reveal.js</title>

		<link rel="stylesheet" href="dist/reset.css">
		<link rel="stylesheet" href="dist/reveal.css">
		<link rel="stylesheet" href="dist/theme/serif.css">

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="plugin/highlight/monokai.css">
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
                <section data-markdown>
                  <textarea data-template>
                    ## /*Jin*&middot;isms/

                    60 Things we learned from *Jin*.

                    <small>May 15, 2023</small>

                    ---

                    ### Part I:
                    
                    What we learned about *people*

                    ---

                    #### **X. Your network is your net worth.**

                    Say hi to that person in the elevator. Learn everyone's
                    names. You'll never know when that connection you've
                    made might come in handy one day.

                    ---

                    #### **X. Practice forgiveness.**
                    
                    Let go of grudges and resentments. These things are out
                    of your control; only you can choose to move on.

                    ---

                    #### **X. Showing up is half the battle.**

                    Sometimes you just need to show up when other people
                    won't. You make your own luck when you make an effort.

                    ---

                    #### **X. Serve others.**

                    Make a positive impact on the world around you by
                    serving others and giving back to your community
                    where you can. Don't worry about being perfect;
                    worry about being consistent and reliable.

                    ---

                    #### **X. Treat everyone with respect.**

                    Treat everyone you meet with an equal amount of
                    respect, generosity, and compassion. You can Find
                    common ground with anyone, even when you least
                    expect it. Sometimes these are the richest relationships
                    you'll have in life. Take care of people from all
                    walks of life&mdash;you'll see the impact it makes
                    on your worldview.

                    ---

                    #### **X. Don't compare yourself to others.**

                    You'll never get anywhere talking about others
                    or comparing your situation with theirs.
                    Everyone has their own stories. The only person
                    you can judge is yourself.

                    ---

                    ### Part II:
                    What we learned about *the world*

                    ---

                    #### **X. Always be prepared.**

                    Get the extra-long jumper cables just in case.
                    Write down the important details you might need
                    later. Find your exit strategy before you start.

                    ---

                    ### Chapter 3:
                    What we learned about *ourselves*

                    ---

                    #### **X. Don't be afraid to speak up**
    
                    Your voice has strength. There's almost always a way to
                    get what you're after. That person on the other side of
                    the table can always be convinced, that rule can always
                    be interpreted another way, and there's always a creative
                    solution. It doesn't hurt to ask.

                    ---

                    #### **X. Take pride in everything you do**

                    Take pride in everything you do and strive for
                    completion. Results will invariably come soon after.
                    Be proactive and take initiative when
                    you see opportunities. The deepest satisfaction comes
                    from a job well done. Nothing is below you.

                    ---

                    #### **X. Things will only bring sadness**

                    Your material things will usuaully cause you more harm
                    than good. Success is not measured by material possessions,
                    but by the impact you leave behind. Invest in the things
                    that matter, then focus your energy elsewhere.

                    ---

                    #### **X. Take responsibility for your actions**

                    Fixing your mistake will take days. Fixing your
                    reputation will take years.

                    ---

                    #### **X. Don't be afraid of the dark**
    
                    Don't let fear hold you back. You're much more capable
                    than you might believe at first. Every big challenge is
                    just a collection of little challenges you've seen before.

                    ---

                    #### **X. It's not too late to learn**
                    
                    It's never too late to learn something new. Talk to
                    people, pick up a book, or just throw yourself into
                    the deep end. Stay curious and be a lifelong learner&mdash;
                    knowledge is there for the taking.

                    ---

                    #### **X. Embrace change and be flexible**

                    Stress is how you've chosen to react to a situation.
                    Take a deep breath, look at everything with a level
                    head, and keep moving&mdash;the sooner you learn to
                    adapt, the more you'll be able to achieve.

                  </textarea>
                </section>
			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="plugin/notes/notes.js"></script>
		<script src="plugin/markdown/markdown.js"></script>
		<script src="plugin/highlight/highlight.js"></script>
		<script>
			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,
                margin: 0.1,

				// Learn about plugins: https://revealjs.com/plugins/
				plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
			});
		</script>
	</body>
</html>
