                    ## /*Jin*&middot;isms/

                    60 Things we learned from *Jin*.

                    <small>May 15, 2023</small>

                    ---

                    ### Part I:
                    
                    What we learned about *people*

                    ---

                    #### *1. Your network is your net worth.*

                    Say hi to that person in the elevator. Learn everyone's
                    names. You'll never know when that connection you've
                    made might come in handy one day.

                    ---

                    #### *2. Practice forgiveness.*
                    
                    Let go of grudges and resentments. These things are out
                    of your control; only you can choose to move on.

                    ---

                    #### *3. Showing up is half the battle.*

                    Sometimes you just need to show up when other people
                    won't. You make your own luck when you make an effort.

                    ---

                    #### *4. Serve others.*

                    Make a positive impact on the world around you by
                    serving others and giving back to your community
                    where you can. Don't worry about being perfect;
                    worry about being consistent and reliable.

                    ---

                    #### *5. Treat everyone with respect.*

                    Treat everyone you meet with an equal amount of
                    respect, generosity, and compassion. You can Find
                    common ground with anyone, even when you least
                    expect it. Sometimes these are the richest relationships
                    you'll have in life. Take care of people from all
                    walks of life&mdash;you'll see the impact it makes
                    on your worldview.

                    ---

                    #### *6. Don't compare yourself to others.*

                    You'll never get anywhere talking about others
                    or comparing your situation with theirs.
                    Everyone has their own stories. The only person
                    you can judge is yourself.

                    ---

                    #### *7. Be reliable and dependable.*

                    Build a reputation for being reliable and following
                    through with your committments. Learn to say "no"
                    when you can't deliver on your promises.

                    ---

                    #### *8. Be decisive.*

                    Learn to make decisions confidently and quickly.
                    When you do, others will follow suit. Be a bastion
                    for stability and direction.

                    ---

                    #### *9. Practice sponsorship.*

                    Uplift the people around you by giving them the
                    chances you might not have had. Everyone wants to
                    prove themselves, but not everyone has the same
                    opportunities. Go out of your way to help people
                    reach their potential. Everyone deserves a chance.

                    ---

                    #### *10. Be an effective communicator.*

                    Convey your ideas and your needs clearly. When you
                    do, you'll inspire others around you.

                    ---

                    #### *11. Take care of family.*

                    Your family will always be there for you. Go above
                    and beyond to be there for them, no questions asked.

                    ---

                    #### *12. Practice what you preach.*

                    Never ask anyone to do something you won't do
                    yourself.

                    ---

                    #### *13. Look at people in the eye.*

                    Good eye contact and a firm handshake can tell you
                    everything you need to know about a person.


                    ---

                    #### *14. Do nice things for people...*

                    Do nice things for people who will never find out.
                    Take joy in your actions, not in the recognition of
                    those actions.

                    ---

                    ### Part II:
                    What we learned about *the world*

                    ---

                    #### *15. Always be prepared.*

                    Get the extra-long jumper cables just in case.
                    Write down the important details you might need
                    later. Find your exit strategy before you start.

                    ---

                    #### *16. Have a healthy sense of humor.*

                    Life's full of ups and downs, and the best way
                    to get through them is to enjoy the little moments.
                    Most things aren't *that* serious, and laughter
                    can break down barriers. Seek out the people
                    who will laugh with you.

                    ---

                    #### *17. Be financially responsible.*

                    Live within your means, save for the future, and
                    avoid unnecessary debt. After a while, you'll
                    realize that you were never really missing anything.

                    ---

                    #### *18. Live in the present.*

                    Don't get too caught up in what *was* or what
                    *could have been*. All we can affect is the here
                    and now, so soak it all in.

                    ---

                    #### *19. Enjoy the little things.*

                    Sometimes all it takes is a scoop of vanilla ice
                    cream to undo a long day. Don't overthink it.

                    ---

                    #### *20. Develop a sense of adventure.*

                    Leave the GPS at home and get lost from time to
                    time. Pull over and try that pizza place on the side of
                    the road. Take risks and embrace novelty.

                    ---

                    #### *21. Keep your eyes open.*

                    Take inspiration from your surroundings. Hotel linens,
                    the layout of a room, an ADA-compliant ramp; details
                    are everything, and they're hiding where you least
                    expect them.

                    ---

                    #### *22. Did you ask?*

                    The items on the restaurant menu are mostly a
                    suggestion. They will put almost anything you
                    want on a pizza if you just ask (and pay for it).

                    ---

                    #### *23. Get out of bed.*

                    If you don't get out of bed on time, you're
                    throwing out a perfectly good day.

                    ---

                    #### *24. Listen carefully.*

                    We're surrounded by powerful ideas and insightful
                    comments that people simply don't hear. When you
                    open your ears, you open your mind to new ideas.

                    ---

                    #### *25. Don't buy a BMW.*

                    It'll just B-M-Trouble you.

                    ---

                    #### *26. Do the right thing.*

                    Do the right thing, not the easy thing.

                    ---

                    #### *27. Take more pictures.*

                    Take more pictures, even when people aren't looking.
                    You'll always cherish the simple, candid moments
                    when you're looking back.

                    ---

                    #### *28. Everything has its place.*

                    Put things back where you expect to find them the
                    next time.

                    ---

                    #### *29. Always fill up.*

                    Never let your gas tank fall below a 1/4 tank. You
                    might have to pick up and leave at a moment's notice.

                    ---

                    #### *30. Leave things better than you found them.*

                    Always leave things better than you found them, even
                    if it's just by a little. A little improvement here
                    and there will add up.

                    ---

                    #### *31. Cash is (still) king.*

                    Always have enough cash to get yourself out of a
                    sticky situation.

                    ---

                    #### *32. There's no such thing as luck.*

                    There's no such thing as good or bad luck, only
                    taken or missed opportunities.

                    ---

                    #### *33. Foggy mirror?*

                    Use shaving cream to keep the mirror from fogging
                    up.

                    ---

                    #### *34. Intellect vs. Intelligence.*

                    Recognize the difference between Intellect and
                    Intelligence, then cultivate them both. You'll
                    find you need both in life, but they don't come
                    for free.


                    ---

                    #### *35. Don't worry about imperfection.*

                    Don't let perfect get in the way of good. Find ways
                    to improve the next time, but don't get stuck chasing
                    the impossible. You might find that some imperfections
                    are worth celebrating.

                    ---

                    #### *36. Take a moment of silence.*

                    When doing something important, take a moment to
                    collect yourself. Look around before you leave the
                    house, double check your work, or simply embrace
                    solitude for a quick refresher.

                    ---

                    #### *37. Polish your shoes.*

                    A clean pair of shoes says a lot about you. Take
                    care of the things you have, and always put your
                    best foot forward.
                    
                    ---

                    #### *38. Write in the margins.*

                    Your favorite books should be marked up with your
                    own thoughts and ideas. Question everything put in
                    front of you and bring your own meaning to the things
                    you encounter. Life is a continual conversation between
                    you and the world.

                    ---

                    #### *39. Be detail-oriented.*

                    Know when to get the little details right. When you
                    receive a bill in the mail, write a date on the
                    envelope. When you build a building, check all the
                    clearances.

                    ---


                    ### Part III:
                    What we learned about *ourselves*

                    ---

                    #### *40. Don't be afraid to speak up.*
    
                    Your voice has strength. There's almost always a way to
                    get what you're after. That person on the other side of
                    the table can always be convinced, that rule can always
                    be interpreted another way, and there's always a creative
                    solution. It doesn't hurt to ask.

                    ---

                    #### *41. Take pride in everything you do.*

                    Take pride in everything you do and strive for
                    completion. Results will invariably come soon after.
                    Be proactive and take initiative when
                    you see opportunities. The deepest satisfaction comes
                    from a job well done. Nothing is below you.

                    ---

                    #### *42. Things will only bring sadness.*

                    Your material things will usually cause you more harm
                    than good. Success is not measured by material possessions,
                    but by the impact you leave behind. Invest in the things
                    that matter, then focus your energy elsewhere.

                    ---

                    #### *43. Take responsibility for your actions.*

                    Fixing your mistake will take days. Fixing your
                    reputation will take years.

                    ---

                    #### *44. Don't be afraid of the dark.*
    
                    Don't let fear hold you back. You're much more capable
                    than you might believe at first. Every big challenge is
                    just a collection of little challenges you've seen before.

                    ---

                    #### *45. It's not too late to learn.*
                    
                    It's never too late to learn something new. Talk to
                    people, pick up a book, or just throw yourself into
                    the deep end. Stay curious and be a lifelong learner&mdash;
                    knowledge is there for the taking.

                    ---
                        
                    #### *46. Sit with your thoughts.*

                    Don't feel compelled to fill in the silence throughout
                    your day. Turn off the music, sit with your thoughts,
                    and let your mind wander. Knowing yourself is the greatest
                    thing you can accomplish.
    
                    ---

                    #### *47. Embrace change and be flexible.*

                    Stress is how you've chosen to react to a situation.
                    Take a deep breath, look at everything with a level
                    head, and keep moving&mdash;the sooner you learn to
                    adapt, the more you'll be able to achieve.

                    ---

                    #### *48. Take action.*

                    Don't just talk about your goals&mdash;take action
                    to make them a reality. Life doesn't happen to us,
                    it comes from us.

                    ---

                    #### *49. Be authentic.*

                    Be true to yourself and your values above all; don't
                    try to be someone you're not. The only person you're
                    cheating is yourself.

                    ---

                    #### *50. Don't get complacent.*

                    Pay attention to the changing world around you and
                    strive to stay ahead of it. Keep an open mind and
                    don't be afraid to make changes to keep up.

                    ---

                    #### *51. Trust your instincts.*

                    Learn to trust your insticts. Your internal compass
                    will bring you to the right opportunities. When
                    something is too good to be true, it probably is.

                    ---

                    #### *52. Be resourceful.*

                    Almost everything you need to succeed is ripe for
                    the taking. When you can't find what you need, don't
                    be afraid to ask for help.

                    ---

                    #### *53. Purpose is everywhere.*

                    Purpose can be found in almost anything. Care enough
                    about anything you do and you'll never have a problem
                    with motivation.

                    ---

                    #### *54. Learn to let go.*

                    Learn to let go of things that are beyond your control,
                    like the opinions of others or the outcome of a situation.
                    There's no going back, so move forward with a new
                    understanding of your past.

                    ---

                    #### *55. Make the most of what you have.*

                    You can't always get what you want, but you can make the
                    most of what you have. Appreciate the things you have, make
                    the best of your situation, and don't get greedy.

                    ---

                    #### *56. There's always room for improvement.*

                    Hold yourself and others to a higher standard. You'll
                    never regret doing your best.

                    ---

                    #### *57. Failure is a stepping stone.*

                    Failure isn't the end; it's an opportunity for growth.
                    Embrace your failures, learn from them, and use them
                    as stepping stones toward success. Each setback can
                    provide valuable lessons for the future.

                    ---

                    #### *58. Nurture your creativity.*

                    Give yourself opportunities to embrace creativity.
                    Doodle your ideas on a piece of paper, save your
                    favorite quotes, and read things that make you happy.
                    You need ways to express yourself when nobody's looking.

                    ---

                    #### *59. Stand up straight...*

                    Stand up straight, pull your shoulders back, and
                    keep your head up.

                    ---

                    <!-- .slide: data-autoplay="3000" -->

                    #### *60. The best is yet to come...*
                    
                    These are only a handful of things we've learned
                    from Jin over the years (yes, we do listen!). They've
                    been with us through everything from our highest to our
                    lowest moments, from our biggest accomplishments to how
                    we live our lives each and every day. 
                    <!-- .element: class="fragment" data-fragment-index="1" data-autoplay="1000" -->

                    There's no shortage of lessons that could have made
                    it onto this list, and certainly no shortage of lessons to
                    come. 
                    <!-- .element: class="fragment" data-fragment-index="2" data-autoplay="2000" -->

                    Thank you for *everything*. 
                    <!-- .element: class="fragment" data-fragment-index="3" data-autoplay="2000" -->

                    ## 🎉

                    ### Happy Birthday, Jin!
